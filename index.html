<!DOCTYPE html>
<html>
<head>
<style>
  :root { --red: #ff3b30; --gray: #e5e5ea; }
  
  html, body { 
    background-color: #ffffff !important; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
    font-family: -apple-system, sans-serif; 
    overflow: hidden; 
  }
  
  /* Ultra-compact Mini Pill */
  .pill-container { 
    position: relative; 
    width: 210px; 
    height: 48px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    background-color: #ffffff; 
    border-radius: 24px; 
    border: 1.2px solid #eeeeee; 
    box-shadow: 0 1px 5px rgba(0,0,0,0.05);
  }

  .progress-svg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; overflow: visible; }
  .track { fill: none; stroke: var(--gray); stroke-width: 4; }
  .bar { fill: none; stroke: var(--red); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear; transform: scaleX(-1) rotate(180deg); transform-origin: center; }

  .content { display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 2; color: #000000; width: 100%; }
  
  .time-group { display: flex; align-items: center; }
  .time-group input { 
    background: transparent; border: none; color: #000000; width: 30px; text-align: center; 
    font-size: 20px; font-weight: 800; outline: none; padding: 0;
  }
  .time-group span { color: #bbbbbb; font-size: 16px; font-weight: bold; margin-bottom: 1px; }
  input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .controls { display: flex; align-items: center; gap: 6px; }
  .control-btn { background: transparent; border: none; cursor: pointer; padding: 2px; display: flex; align-items: center; outline: none; }
  
  .play-icon { fill: #000000; width: 16px; height: 16px; }
  .reset-icon { stroke: #bbbbbb; stroke-width: 5; fill: none; width: 12px; height: 12px; }
  .control-btn:hover .reset-icon { stroke: #ff3b30; }
</style>
</head>
<body>

<div class="pill-container">
  <svg class="progress-svg" viewBox="0 0 210 48">
    <path class="track" d="M25,4 L185,4 A20,20 0 0,1 185,44 L25,44 A20,20 0 0,1 25,4" />
    <path id="prog" class="bar" d="M25,4 L185,4 A20,20 0 0,1 185,44 L25,44 A20,20 0 0,1 25,4" />
  </svg>

  <div class="content">
    <div class="time-group">
      <input type="number" id="h" value="00"><span>:</span>
      <input type="number" id="m" value="00"><span>:</span>
      <input type="number" id="s" value="20">
    </div>
    
    <div class="controls">
      <button class="control-btn" onclick="toggleTimer()">
        <svg class="play-icon" viewBox="0 0 24 24">
          <path id="iconPath" d="M8 5v14l11-7z"/>
        </svg>
      </button>
      
      <button class="control-btn" onclick="resetToZero()">
        <svg class="reset-icon" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  let timer, isRunning = false, totalSeconds = 0, timeLeft = 0;
  const prog = document.getElementById('prog'), path = document.getElementById('iconPath');
  const hIn = document.getElementById('h'), mIn = document.getElementById('m'), sIn = document.getElementById('s');
  const length = prog.getTotalLength();
  
  prog.style.strokeDasharray = length;
  prog.style.strokeDashoffset = 0;

  window.onload = () => {
    // window.location.search will return "?5"
    // .substring(1) removes the "?" to leave just "5"
    const val = window.location.search.substring(1); 

    if (val && !isNaN(val)) {
        hIn.value = "00";
        mIn.value = val.padStart(2, '0');
        sIn.value = "00";
    }
};



  function toggleTimer() { !isRunning ? start() : pause(); }

  function start() {
    if (timeLeft <= 0) {
      timeLeft = (parseInt(hIn.value) || 0) * 3600 + (parseInt(mIn.value) || 0) * 60 + (parseInt(sIn.value) || 0);
      totalSeconds = timeLeft;
    }
    if (timeLeft <= 0) return;
    isRunning = true;
    hIn.disabled = mIn.disabled = sIn.disabled = true;
    path.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); 
    
    timer = setInterval(() => {
      timeLeft--;
      prog.style.strokeDashoffset = length - (timeLeft / totalSeconds) * length;
      hIn.value = String(Math.floor(timeLeft / 3600)).padStart(2, '0');
      mIn.value = String(Math.floor((timeLeft % 3600) / 60)).padStart(2, '0');
      sIn.value = String(timeLeft % 60).padStart(2, '0');
      if (timeLeft <= 0) { clearInterval(timer); resetToZero(); }
    }, 1000);
  }

  function pause() {
    clearInterval(timer);
    isRunning = false;
    hIn.disabled = mIn.disabled = sIn.disabled = false;
    path.setAttribute('d', 'M8 5v14l11-7z');
  }

  function resetToZero() {
    clearInterval(timer);
    isRunning = false;
    timeLeft = 0; totalSeconds = 0;
    hIn.value = mIn.value = sIn.value = "00";
    hIn.disabled = mIn.disabled = sIn.disabled = false;
    path.setAttribute('d', 'M8 5v14l11-7z');
    prog.style.strokeDashoffset = 0;
  }
</script>
</body>
</html>
